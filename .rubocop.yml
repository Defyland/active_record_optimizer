AllCops:
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 3.2

Layout/LineLength:
  Max: 140

Style/Documentation:
  Enabled: false

Metrics/AbcSize:
  Max: 30

Metrics/BlockLength:
  Exclude:
    - "test/**/*_test.rb"
    - "*.gemspec"

Metrics/ClassLength:
  Max: 150
  Exclude:
    - "test/**/*_test.rb"

Metrics/MethodLength:
  Max: 20
  Exclude:
    - "test/**/*_test.rb"
